<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Seven Kitchen</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    
    <style>
        /* Correction globale pour le scroll mobile */
        html, body {
            overflow-x: hidden;
            overflow-y: auto !important;
            height: auto !important;
            background-color: #0a0a0a;
        }

        .main-wrapper {
            height: auto !important;
            min-height: 100vh;
            padding-top: 100px;
            padding-bottom: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Conteneur principal */
        .contact-container {
            display: flex;
            gap: 50px;
            width: 100%;
            max-width: 1200px;
            margin-top: 30px;
            padding: 0 20px;
        }

        .contact-info, .contact-form { flex: 1; }

        /* Carte d'information */
        .info-card {
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
            padding: 40px !important;
            border-radius: 20px;
            text-align: left;
            height: 100%;
        }

        .info-title {
            color: var(--gold-yellow);
            font-size: 1.5rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            font-weight: 800;
        }

        .info-item { display: flex; align-items: center; margin-bottom: 25px; }
        
        /* Style pour les nouvelles icônes images */
        .info-icon-img { 
            width: 35px; 
            height: 35px; 
            margin-right: 20px; 
            object-fit: contain;
            filter: drop-shadow(0 0 5px rgba(255, 193, 7, 0.3));
        }

        .info-text span { display: block; font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .info-text p { color: #fff; font-size: 1rem; margin: 0; }

        /* Formulaire */
        .input-group { margin-bottom: 15px; text-align: left; }
        input, textarea {
            width: 100%;
            padding: 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--gold-yellow);
            background: rgba(255, 215, 0, 0.05);
        }

        /* Section Google Maps */
        .map-section {
            width: 100%;
            max-width: 1200px;
            margin-top: 50px;
            padding: 0 20px;
            border-radius: 20px;
            overflow: hidden;
        }

        .map-container {
            width: 100%;
            height: 400px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            filter: grayscale(1) invert(0.9) contrast(1.2); /* Effet sombre pour la carte */
        }

        /* Pop-up de validation */
        .popup-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            backdrop-filter: blur(10px);
        }

        .popup-content {
            max-width: 400px; width: 85%; text-align: center;
            border: 1px solid var(--gold-yellow); background: #0a0a0a;
            padding: 50px 30px; border-radius: 12px; position: relative;
        }

        .success-icon { width: 80px; height: 80px; margin: 0 auto 20px; }
        .check-outline { stroke: var(--gold-yellow); stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: dash 1.5s ease-in-out forwards; }
        .check-mark { stroke: #fff; stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: dash 0.8s 0.5s ease-in-out forwards; }
        @keyframes dash { to { stroke-dashoffset: 0; } }

        .close-popup { position: absolute; top: 15px; right: 20px; font-size: 28px; color: var(--gold-yellow); cursor: pointer; }

        /* ADAPTATION MOBILE */
        @media (max-width: 900px) {
            .contact-container { flex-direction: column; gap: 30px; }
            .main-wrapper h2 { font-size: 2rem !important; text-align: center; }
            .info-card { padding: 25px !important; }
            .map-container { height: 300px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">SEVEN KITCHEN</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="menu.html">La Carte</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="main-wrapper">
        <h2 style="color:var(--gold-yellow); margin-bottom: 20px; font-size: 3rem; text-transform: uppercase;" data-aos="fade-down">NOUS CONTACTER</h2>

        <div class="contact-container">
            <div class="contact-info" data-aos="fade-right">
                <div class="info-card">
                    <h3 class="info-title">Seven Infos</h3>
                    <div class="info-item">
                        <img src="img/pin.png" alt="Adresse" class="info-icon-img">
                        <div class="info-text"><span>Adresse</span><p>7 Rue des Grognards, Fontainebleau</p></div>
                    </div>
                    <div class="info-item">
                        <img src="img/telephone.png" alt="Téléphone" class="info-icon-img">
                        <div class="info-text"><span>Téléphone</span><p>01 77 77 77 77</p></div>
                    </div>
                    <div class="info-item">
                        <img src="img/horaires.png" alt="Horaires" class="info-icon-img">
                        <div class="info-text"><span>Horaires</span><p>Ouvert 7j/7 : 11h - 23h</p></div>
                    </div>
                </div>
            </div>

            <div class="contact-form" data-aos="fade-left">
                <form id="contact-form">
                    <div class="input-group"><input type="text" name="nom" placeholder="Votre Nom" required></div>
                    <div class="input-group"><input type="email" name="email" placeholder="Votre Email" required></div>
                    <div class="input-group"><textarea name="message" rows="5" placeholder="Comment pouvons-nous vous régaler ?" required></textarea></div>
                    <button type="submit" id="submit-btn" class="btn-street" style="width:100%; cursor: pointer;">Envoyer</button>
                    <p id="status" style="margin-top: 10px; text-align: center;"></p>
                </form>
            </div>
        </div>

        <!-- Section Google Maps Intégrée -->
        <div class="map-section" data-aos="fade-up">
            <iframe 
                class="map-container"
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2647.781358941617!2d2.6934509!3d48.4031548!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47e5f49000000001%3A0x7d00000000000000!2s7%20Rue%20des%20Grognards%2C%2077300%20Fontainebleau!5e0!3m2!1sfr!2sfr!4v1700000000000" 
                style="border:0;" 
                allowfullscreen="" 
                loading="lazy" 
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </div>
    </div>

    <div id="popup-success" class="popup-overlay">
        <div class="popup-content">
            <span class="close-popup" onclick="closePopup()">×</span>
            <div class="success-icon">
                <svg viewBox="0 0 100 100">
                    <circle class="check-outline" cx="50" cy="50" r="45" fill="none" stroke-width="2"/>
                    <path class="check-mark" d="M30 50l15 15 25-30" fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h3 style="color:var(--gold-yellow); font-size: 2rem;">Validé !</h3>
            <p style="margin-top:10px; color: #fff;">Nous reviendrons vers vous très vite.</p>
            <button class="btn-street" style="margin-top:25px; padding: 10px 40px; cursor: pointer;" onclick="closePopup()">Génial</button>
        </div>
    </div>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });

        const form = document.getElementById("contact-form");
        const popup = document.getElementById("popup-success");
        const btn = document.getElementById("submit-btn");
        const status = document.getElementById("status");

        form.addEventListener("submit", async function(event) {
            event.preventDefault();
            btn.innerHTML = "Traitement...";
            btn.disabled = true;

            const data = new FormData(event.target);

            try {
                const response = await fetch("https://formspree.io/f/xnjwlzlr", {
                    method: 'POST',
                    body: data,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    btn.innerHTML = "Envoyer";
                    btn.disabled = false;
                    popup.style.display = "flex";
                    form.reset();
                    status.innerHTML = "";
                } else {
                    btn.innerHTML = "Réessayer";
                    btn.disabled = false;
                    status.innerHTML = "<span style='color:#ffc107'>Erreur de serveur.</span>";
                }
            } catch (error) {
                btn.innerHTML = "Réessayer";
                btn.disabled = false;
                status.innerHTML = "<span style='color:#ffc107'>Erreur de connexion.</span>";
            }
        });

        function closePopup() { 
            popup.style.display = "none"; 
        }
    </script>
</body>
</html>
